<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jekichani</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="js/jekichani.js">
    <script  src="js/jekichani.js" defer></script>
</head>
<body>
    <div class="score">
        <img src="images/ROCKPAPERSCISSORS..svg" alt="" class="score__logo">
        <div class="score__count">
            <span class="score__count-text">socre</span>
            <h3 class="score__count-value">12</h3>
        </div>
    </div>
    <!-- score -->
    <div class="choose">
        <div class="choose__circle choose__paper"><div class="choose__circle-second"><img src="images/paper.png" alt=""></div></div>
        <div class="choose__circle choose__scissors"><div class="choose__circle-second"><img src="images/scissors.png" alt=""></div></div>
        <div class="choose__circle choose__rock"><div class="choose__circle-second"><img src="images/rock.png" alt=""></div></div>
    </div>
    <div class="modal" id="modal">
        <div class="modal__wrapper">
            <div class="modal__headline">
                <h3 class="modal__headline-text">RULES</h3>
                <button id="modalExit"><img src="images/Combined Shape.svg" alt=""></button>
            </div>
            <img src="images/Group 16.png" alt="">
        </div>
    </div>
    <!-- modas -->
    <button class="rules" id="rules">RULES</div>
    <!-- rule -->
</body>
</html>
